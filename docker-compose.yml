services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: digitalforge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  web:
    build:
      context: ./backend
    command: ./scripts/start_web.sh
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.docker
      DJANGO_SECRET_KEY: unsafe-dev-key
      DJANGO_DEBUG: "True"
      POSTGRES_DB: digitalforge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      PRIVATE_STORAGE_BASE_URL: https://downloads.example.com/private
      STRIPE_WEBHOOK_SECRET: whsec_example
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  worker:
    build:
      context: ./backend
    command: ./scripts/start_worker.sh
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.docker
      DJANGO_SECRET_KEY: unsafe-dev-key
      DJANGO_DEBUG: "True"
      POSTGRES_DB: digitalforge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
